<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MOSTAKIM-MD-BOT - WhatsApp Linker</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"/>
  <style>
    :root {
      --primary-color: #7b2fd4;
      --secondary-color: #ffffff;
      --accent-color: #220f3a;
      --text-color: #f0e6ff;
      --background-color: #1a0d2e;
      --hover-color: #220f3a;
      --border-color: rgba(180,130,255,0.15);
      --gold: #d4af37;
      --gold2: #f5d060;
      --gold-glow: rgba(212,175,55,0.20);
      --purple-glow: rgba(155,93,229,0.25);
      --text2: #a888cc;
    }

    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0e0618;
      color: var(--text-color);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 15px;
      position: relative;
      overflow-x: hidden;
    }

    /* Background blobs */
    body::before {
      content: '';
      position: fixed;
      width: 400px; height: 400px;
      background: #7b2fd4;
      border-radius: 50%;
      filter: blur(100px);
      opacity: 0.15;
      top: -120px; left: -120px;
      pointer-events: none;
      z-index: 0;
      animation: blobFloat 9s ease-in-out infinite alternate;
    }
    body::after {
      content: '';
      position: fixed;
      width: 300px; height: 300px;
      background: var(--gold);
      border-radius: 50%;
      filter: blur(100px);
      opacity: 0.08;
      bottom: -80px; right: -80px;
      pointer-events: none;
      z-index: 0;
      animation: blobFloat 9s ease-in-out infinite alternate-reverse;
    }
    @keyframes blobFloat {
      0%   { transform: translate(0,0) scale(1); }
      100% { transform: translate(20px,15px) scale(1.07); }
    }

    .container {
      width: 100%;
      max-width: 450px;
      background: #1a0d2e;
      border-radius: 20px;
      padding: 28px 25px 22px;
      box-shadow: 0 12px 48px rgba(0,0,0,0.6), 0 0 0 1px rgba(212,175,55,0.25);
      border: 1.5px solid rgba(180,130,255,0.15);
      position: relative;
      z-index: 1;
    }
    /* Gold corner accents */
    .container::before {
      content: '';
      position: absolute;
      top: 10px; left: 10px;
      width: 32px; height: 32px;
      border-top: 2px solid var(--gold);
      border-left: 2px solid var(--gold);
      border-radius: 5px 0 0 0;
      opacity: 0.5;
    }
    .container::after {
      content: '';
      position: absolute;
      bottom: 10px; right: 10px;
      width: 32px; height: 32px;
      border-bottom: 2px solid var(--gold);
      border-right: 2px solid var(--gold);
      border-radius: 0 0 5px 0;
      opacity: 0.5;
    }

    .header {
      text-align: center;
      margin-bottom: 22px;
    }

    /* ── Logo / Profile image ── */
    .logo {
      width: 80px;
      height: 80px;
      margin: 0 auto 14px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      color: var(--gold);
      border: 3px solid var(--gold);
      box-shadow: 0 0 0 5px rgba(212,175,55,0.12), 0 6px 24px var(--purple-glow);
      position: relative;
      overflow: hidden;
      background: linear-gradient(135deg, #7b2fd4, #9b5de5);
      animation: ringPulse 2.8s ease-in-out infinite;
    }
    /* ✅ যদি IMAGE_URL দেওয়া থাকে তাহলে ছবি দেখাবে */
    .logo img {
      width: 100%; height: 100%;
      object-fit: cover;
      border-radius: 50%;
      position: absolute;
      top: 0; left: 0;
    }
    @keyframes ringPulse {
      0%,100% { box-shadow: 0 0 0 5px rgba(212,175,55,0.12), 0 6px 24px var(--purple-glow); }
      50%     { box-shadow: 0 0 0 8px rgba(212,175,55,0.05), 0 6px 24px var(--purple-glow); }
    }

    .title {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 6px;
      color: var(--text-color);
      letter-spacing: 0.5px;
    }
    .title span { color: var(--gold); }

    .subtitle {
      font-size: 13px;
      color: var(--text2);
      margin-bottom: 12px;
    }

    /* Status badge */
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      font-weight: 600;
      color: var(--gold);
      background: var(--gold-glow);
      border: 1px solid rgba(212,175,55,0.3);
      border-radius: 20px;
      padding: 3px 12px;
      margin-bottom: 14px;
    }
    .status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--gold);
      animation: dotPulse 1.6s ease-in-out infinite;
    }
    @keyframes dotPulse {
      0%,100% { opacity:1; transform:scale(1); }
      50%     { opacity:0.4; transform:scale(1.4); }
    }

    .social-icons {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-bottom: 6px;
    }
    .social-icons a {
      width: 42px; height: 42px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 17px;
      text-decoration: none;
      transition: all 0.3s ease;
      border: 1px solid rgba(255,255,255,0.08);
    }
    .social-icons a:hover { transform: translateY(-4px) scale(1.08); box-shadow: 0 8px 20px rgba(0,0,0,0.4); }
    .social-icons a.youtube  { background: linear-gradient(135deg,#FF0000,#900); }
    .social-icons a.telegram { background: linear-gradient(135deg,#0088cc,#005f8e); }
    .social-icons a.whatsapp { background: linear-gradient(135deg,#0cfa10,#0a9e0d); }
    .social-icons a.github   { background: linear-gradient(135deg,#4a1e8c,#2d0f60); border-color: rgba(212,175,55,0.3); }

    /* Divider */
    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(212,175,55,0.3), transparent);
      margin: 16px 0;
    }

    /* Toggle */
    .toggle-container {
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 18px;
      background: #220f3a;
      border-radius: 12px;
      padding: 4px;
      border: 1px solid rgba(180,130,255,0.15);
      gap: 4px;
    }
    .toggle-option {
      flex: 1;
      padding: 10px 16px;
      text-align: center;
      cursor: pointer;
      border-radius: 9px;
      font-size: 14px;
      font-weight: 600;
      transition: all 0.3s ease;
      color: var(--text2);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .toggle-option.active {
      background: linear-gradient(135deg, #7b2fd4, #9b5de5);
      color: #fff;
      box-shadow: 0 4px 14px var(--purple-glow);
    }
    .toggle-option.active i { color: var(--gold); }
    .toggle-option:not(.active) { color: var(--text2); }
    .toggle-option:hover:not(.active) { background: rgba(155,93,229,0.10); color: var(--text-color); }

    /* Input */
    .input-group {
      margin-bottom: 16px;
      transition: all 0.3s ease;
    }
    .input-group.hidden { display: none; }

    .input-label {
      display: block;
      margin-bottom: 7px;
      font-weight: 600;
      font-size: 11.5px;
      color: var(--gold);
      text-transform: uppercase;
      letter-spacing: 0.7px;
    }
    .input-field {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid rgba(180,130,255,0.15);
      border-radius: 12px;
      background: #220f3a;
      color: var(--text-color);
      font-size: 15px;
      transition: border 0.2s, box-shadow 0.2s;
    }
    .input-field::placeholder { color: var(--text2); opacity: 0.6; }
    .input-field:focus {
      outline: none;
      border-color: var(--gold);
      box-shadow: 0 0 0 3px var(--gold-glow);
    }

    /* Generate button */
    .generate-btn {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, #7b2fd4, #9b5de5);
      border: none;
      border-radius: 12px;
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-bottom: 14px;
      box-shadow: 0 4px 18px var(--purple-glow);
      position: relative;
      overflow: hidden;
      letter-spacing: 0.3px;
    }
    .generate-btn::before {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(212,175,55,0.2), transparent);
      transition: left 0.5s;
    }
    .generate-btn:hover::before { left: 100%; }
    .generate-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 26px var(--purple-glow); }
    .generate-btn.hidden { display: none; }

    /* Loading */
    .loading {
      display: none;
      text-align: center;
      margin: 16px 0;
    }
    .loading i {
      font-size: 24px;
      color: var(--gold);
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      0%   { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* Code display */
    .code-display {
      background: #220f3a;
      padding: 12px;
      border-radius: 12px;
      text-align: center;
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 14px;
      min-height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1.5px dashed rgba(180,130,255,0.15);
      color: var(--text2);
    }

    /* QR display */
    .qr-display {
      background: #220f3a;
      padding: 28px;
      border-radius: 12px;
      text-align: center;
      margin-bottom: 14px;
      border: 1.5px solid rgba(212,175,55,0.25);
      display: none;
    }
    .qr-image {
      max-width: 260px;
      max-height: 260px;
      margin: 0 auto 18px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    }
    .qr-instructions {
      font-size: 13px;
      color: var(--text2);
      line-height: 1.5;
    }

    /* Messages */
    .success-message {
      color: var(--gold2);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-size: 16px;
    }
    .error-message {
      color: #f87171;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-size: 14px;
    }

    /* Copy button */
    .copy-btn {
      width: 100%;
      padding: 12px;
      background: transparent;
      border: 1.5px solid rgba(212,175,55,0.30);
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: var(--gold);
      transition: all 0.3s ease;
    }
    .copy-btn:hover {
      background: var(--gold-glow);
      box-shadow: 0 4px 14px var(--gold-glow);
    }

    /* Footer */
    .footer {
      text-align: center;
      margin-top: 18px;
      font-size: 12px;
      color: var(--text2);
    }
    .footer span { color: var(--gold); font-weight: 600; }

    @media (max-width: 480px) {
      .container { padding: 20px 16px; border-radius: 16px; max-width: 400px; }
      .code-display { font-size: 15px; min-height: 50px; }
      .qr-image { max-width: 220px; max-height: 220px; }
      .qr-display { padding: 20px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">

      <!-- ✅ IMAGE SETTINGS: নিচের IMAGE_URL এ আপনার ছবির লিংক দিন -->
      <div class="logo" id="logo">
        <i class="fas fa-robot" id="logoIcon"></i>
      </div>

      <h1 class="title">𝐌𝐎𝐒𝐓𝐀𝐊𝐈𝐌  <span>𝐁𝐎𝐓</span></h1>
      <p class="subtitle">Link your WhatsApp device</p>

      <div class="status-badge">
        <div class="status-dot"></div>
        Online &amp; Ready
      </div>

      <div class="social-icons">
        <a href="https://www.youtube.com/@MOSTAKIM-LABS?sub_confirmation=1" target="_blank" class="youtube"><i class="fab fa-youtube"></i></a>
        <a href="https://t.me/M0STAKIM10X" target="_blank" class="telegram"><i class="fab fa-telegram-plane"></i></a>
        <a href="https://whatsapp.com/channel/LINK" target="_blank" class="whatsapp"><i class="fab fa-whatsapp"></i></a>
        <a href="https://github.com/mostakim10x/README.md" target="_blank" class="github"><i class="fab fa-github"></i></a>
      </div>
    </div>

    <div class="divider"></div>

    <!-- Toggle Switch — ORIGINAL -->
    <div class="toggle-container">
      <div class="toggle-option active" data-mode="pair">
        <i class="fas fa-key"></i> Pair Code
      </div>
      <div class="toggle-option" data-mode="qr">
        <i class="fas fa-qrcode"></i> QR Code
      </div>
    </div>

    <div class="input-group" id="inputGroup">
      <label class="input-label">Enter your WhatsApp number with country code</label>
      <input type="text" id="mobileNumber" class="input-field" placeholder="+8801888000000" pattern="[+][8-8]{01,}" title="Please enter country code starting with + followed by number">
    </div>

    <button class="generate-btn" id="submit">
      <i class="fas fa-key"></i> Generate Pair Code
    </button>

    <div class="loading" id="loading">
      <i class="fas fa-spinner"></i>
    </div>

    <div class="code-display" id="codeDisplay">
      Your pair code will appear here
    </div>

    <div class="qr-display" id="qrDisplay">
      <img id="qrImage" class="qr-image" src="" alt="QR Code">
      <div class="qr-instructions" id="qrInstructions">
        Scan this QR code with your WhatsApp app
      </div>
    </div>

    <button class="copy-btn" id="copy" onclick="copyCode()">
      <i class="fas fa-copy"></i> Copy Code
    </button>

    <div class="footer">
      <p>© 2026 <span>MOSTAKIM ISLAM SAGOR</span> | MOSTAKIM-MD-BOT</p>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.0.0-alpha.1/axios.min.js"></script>
  <script>
    // ✅ শুধু এই লাইনে আপনার ছবির লিংক দিন
    const IMAGE_URL = "https://i.imgur.com/v4quRml.jpeg";

    // Image loader
    if (IMAGE_URL && IMAGE_URL.trim() !== '') {
      const logo = document.getElementById('logo');
      const icon = document.getElementById('logoIcon');
      const img = document.createElement('img');
      img.src = IMAGE_URL;
      img.alt = 'Profile';
      img.onerror = function() { this.remove(); }; // লিংক কাজ না করলে icon দেখাবে
      icon.style.display = 'none';
      logo.appendChild(img);
    }

    // ── ORIGINAL JS — হুবহু অপরিবর্তিত ──────────────
    let currentMode = 'pair';

    document.querySelectorAll('.toggle-option').forEach(option => {
      option.addEventListener('click', function() {
        const mode = this.dataset.mode;
        if (mode === currentMode) return;

        document.querySelectorAll('.toggle-option').forEach(opt => opt.classList.remove('active'));
        this.classList.add('active');
        currentMode = mode;

        const submitBtn = document.getElementById('submit');
        const inputGroup = document.getElementById('inputGroup');
        
        if (mode === 'pair') {
          submitBtn.innerHTML = '<i class="fas fa-key"></i> Generate Pair Code';
          submitBtn.classList.remove('hidden');
          inputGroup.classList.remove('hidden');
        } else {
          submitBtn.classList.add('hidden');
          inputGroup.classList.add('hidden');
          generateQRCode();
        }

        document.getElementById('codeDisplay').innerHTML = 'Your pair code will appear here';
        document.getElementById('qrDisplay').style.display = 'none';
        document.getElementById('codeDisplay').style.display = 'flex';
      });
    });

    async function generateQRCode() {
      const codeDisplay = document.getElementById("codeDisplay");
      const qrDisplay = document.getElementById("qrDisplay");
      const loadingSpinner = document.getElementById("loading");

      loadingSpinner.style.display = "block";
      codeDisplay.innerHTML = '';
      qrDisplay.style.display = 'none';

      try {
        const response = await axios('/qr');
        
        if (response.data.qr) {
          document.getElementById('qrImage').src = response.data.qr;
          document.getElementById('qrInstructions').innerHTML = response.data.instructions.join('<br>');
          qrDisplay.style.display = 'block';
          codeDisplay.style.display = 'none';
        } else {
          codeDisplay.innerHTML = '<div class="error-message"><i class="fas fa-exclamation-circle"></i> Failed to generate QR code</div>';
          codeDisplay.style.display = 'flex';
        }
      } catch (error) {
        console.error("Error generating QR code:", error);
        codeDisplay.innerHTML = '<div class="error-message"><i class="fas fa-exclamation-circle"></i> Error generating QR code. Please try again.</div>';
        codeDisplay.style.display = 'flex';
      } finally {
        loadingSpinner.style.display = "none";
      }
    }

    document.getElementById("submit").addEventListener("click", async (e) => {
      e.preventDefault();
      
      const mobileNumberInput = document.getElementById("mobileNumber");
      const codeDisplay = document.getElementById("codeDisplay");
      const qrDisplay = document.getElementById("qrDisplay");
      const loadingSpinner = document.getElementById("loading");

      const mobileNumber = mobileNumberInput.value.trim();
      if (!mobileNumber) {
        codeDisplay.innerHTML = '<div class="error-message"><i class="fas fa-exclamation-circle"></i> Please enter your WhatsApp number</div>';
        return;
      }

      loadingSpinner.style.display = "block";
      codeDisplay.innerHTML = '';
      qrDisplay.style.display = 'none';

      try {
        const response = await axios(`/pair?number=${mobileNumber.replace(/[^0-9]/g, "")}`);
        
        const code = response.data.code || "Service Unavailable";
        if (code === "Service Unavailable") {
          codeDisplay.innerHTML = '<div class="error-message"><i class="fas fa-exclamation-circle"></i> Service Unavailable</div>';
        } else {
          codeDisplay.innerHTML = `<div class="success-message"><i class="fas fa-check-circle"></i> CODE: ${code}</div>`;
        }
        codeDisplay.style.display = 'flex';
      } catch (error) {
        console.error("Error generating code:", error);
        codeDisplay.innerHTML = '<div class="error-message"><i class="fas fa-exclamation-circle"></i> Error generating code. Please try again.</div>';
        codeDisplay.style.display = 'flex';
      } finally {
        loadingSpinner.style.display = "none";
      }
    });

    function copyCode() {
      const codeDisplay = document.getElementById("codeDisplay").innerText;
      const code = codeDisplay.replace('CODE: ', '');
      navigator.clipboard.writeText(code).then(() => {
        const copyBtn = document.getElementById("copy");
        const originalText = copyBtn.innerHTML;
        copyBtn.innerHTML = '<i class="fas fa-check"></i> Copied!';
        setTimeout(() => {
          copyBtn.innerHTML = originalText;
        }, 2000);
      }).catch(err => {
        console.error("Failed to copy text: ", err);
      });
    }
  </script>
</body>
</html>
